services:
  wordpress:
    image: wordpress:latest
    container_name: wordpress
    restart: unless-stopped
    ports:
      - "${BIND_IP}:${WORDPRESS_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST:-mariadb}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-root}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-your_secure_password}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - homelab
    deploy:
      resources:
        limits:
          cpus: "${WORDPRESS_CPU_LIMIT:-1}"
          memory: ${WORDPRESS_MEMORY_LIMIT:-1G}

networks:
  homelab:
    external: true

volumes:
  wordpress_data:
